name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-install:
    name: Backend - install deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

  backend-migrate:
    name: Backend - migrations
    runs-on: ubuntu-latest
    needs: [backend-install]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Create CI .env (SQLite)
        run: |
          cat > .env <<'EOF'
          DJANGO_SECRET_KEY=ci-change-me
          DJANGO_DEBUG=true
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOW_ALL_ORIGINS=true
          CELERY_TASK_ALWAYS_EAGER=true
          JWT_ACCESS_MINUTES=60
          JWT_REFRESH_DAYS=7
          EOF
      - name: Migrate
        working-directory: backend
        run: |
          python manage.py migrate --noinput

  backend-tests:
    name: Backend - tests
    runs-on: ubuntu-latest
    needs: [backend-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Create CI .env (SQLite)
        run: |
          cat > .env <<'EOF'
          DJANGO_SECRET_KEY=ci-change-me
          DJANGO_DEBUG=true
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOW_ALL_ORIGINS=true
          CELERY_TASK_ALWAYS_EAGER=true
          JWT_ACCESS_MINUTES=60
          JWT_REFRESH_DAYS=7
          EOF
      - name: Run Django test suite
        working-directory: backend
        run: |
          python manage.py test

  frontend-lint:
    name: Frontend - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-build:
    name: Frontend - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build

